services:
  - type: web
    name: voter-ready-frontend
    env: node
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://voter-ready-api.onrender.com

  - type: web
    name: voter-ready-api
    env: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONUNBUFFERED
        value: "true"
      - key: GEMINI_API_KEY
        sync: false
      - key: API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: "https://voter-ready-frontend.onrender.com,http://localhost:3000"
